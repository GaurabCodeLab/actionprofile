name: Gaurab
on:
  push:
    branches: ["main"]

  pull_request:
    branches: ["main"]

  workflow_dispatch:

  schedule:
    - cron: "10 14 * * 1-5" # afternoon 2:10 PM, Monday to Friday

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: code checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: maven build
        run: mvn install

  testing:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: code checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: run tests on main branches
        run: mvn test

      - name: checkstyle
        run: mvn checkstyle:checkstyle
