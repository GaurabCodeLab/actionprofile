name: Gaurab
on:
  push:
    branches: ["main"]

  pull_request:
    branches: ["main"]

  workflow_dispatch:

  schedule:
    - cron: "10 14 * * 1-5" # afternoon 2:10 PM, Monday to Friday

env:
  ECR_REPOSITORY: "raja"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: code checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: maven build
        run: mvn install

      - name: Upload Build Artifact (WAR)
        uses: actions/upload-artifact@v6
        with:
          name: vprofile-app
          path: target/*.war

      - name: notify if build fails
        if: failure()
        run: echo "build job failed! please check logs."

  testing:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: code checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: run tests on main branches
        if: github.ref == 'refs/heads/main'
        run: mvn test

      - name: checkstyle
        if: github.ref == 'refs/heads/main'
        run: mvn checkstyle:checkstyle

      - name: run tests on other branches
        if: github.ref != 'refs/heads/main'
        run: echo "skipping unit tests and code analysis"

  Security_Scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: code checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          exit-code: 0
          vuln-type: os,library
          output: trivy-results.json
      - name: Upload Trivy scan results as artifact
        uses: actions/upload-artifact@v6
        with:
          name: trivy-scan-results
          path: trivy-results.json

  build-and-publish:
    name: build-and-publish
    runs-on: ubuntu-latest
    environment: production
    needs: [build, testing, Security_Scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Code checkout
        uses: action/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f Docker-files/app/multistage/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
